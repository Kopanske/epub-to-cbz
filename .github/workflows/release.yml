name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Extract version from tag
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Write version into gradle.properties
        run: |
          echo "version=$VERSION" > gradle.properties
          cat gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build fat JAR (app module)
        run: ./gradlew :app:shadowJar

      - name: Generate SHA256 checksum
        id: checksum
        run: |
          FILE=$(ls app/build/libs/*-all.jar)
          sha256sum "$FILE" > "$FILE.sha256"
          echo "value=$(cat $FILE.sha256)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release with changelog + checksum
        uses: softprops/action-gh-release@v2
        with:
          body: |
            **SHA‑256 Checksum**
            ```
            ${{ steps.checksum.outputs.value }}
            ```
          files: |
            app/build/libs/*-all.jar
            app/build
          
